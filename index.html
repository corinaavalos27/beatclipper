<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BeatClipper" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <title>BeatClipper — AI Beat Sections</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --bg2: #111118;
      --bg3: #18181f;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.13);
      --accent: #c8ff00;
      --accent2: #7c5cff;
      --text: #f0f0f8;
      --muted: #6b6b80;
      --mono: 'DM Mono', monospace;
      --sans: 'DM Sans', sans-serif;
      --display: 'Bebas Neue', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* GRAIN OVERLAY */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.4;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(10,10,15,0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 100;
    }
    .logo {
      font-family: var(--display);
      font-size: 26px;
      letter-spacing: 0.05em;
      color: var(--text);
    }
    .logo span { color: var(--accent); }
    .header-pill {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--muted);
      border: 1px solid var(--border2);
      padding: 4px 10px;
      border-radius: 20px;
    }

    /* MAIN */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem 1.25rem;
    }

    /* UPLOAD ZONE */
    .upload-zone {
      border: 1.5px dashed rgba(200,255,0,0.25);
      border-radius: 16px;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: rgba(200,255,0,0.02);
      margin-bottom: 1.5rem;
      position: relative;
      overflow: hidden;
    }
    .upload-zone::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 120%, rgba(200,255,0,0.06) 0%, transparent 70%);
      pointer-events: none;
    }
    .upload-zone:hover, .upload-zone.drag {
      border-color: var(--accent);
      background: rgba(200,255,0,0.05);
    }
    .upload-icon-wrap {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(200,255,0,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
      border: 1px solid rgba(200,255,0,0.2);
    }
    .upload-icon-wrap svg { width: 24px; height: 24px; stroke: var(--accent); fill: none; stroke-width: 1.5; }
    .upload-title {
      font-family: var(--display);
      font-size: 28px;
      letter-spacing: 0.04em;
      color: var(--text);
      margin-bottom: 6px;
    }
    .upload-sub { font-size: 13px; color: var(--muted); font-family: var(--mono); }
    #file-input { display: none; }

    /* PANEL */
    .panel {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem 1.25rem;
      margin-bottom: 1rem;
    }
    .panel-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    /* WAVEFORM */
    .waveform-wrap {
      position: relative;
      background: var(--bg3);
      border-radius: 10px;
      overflow: hidden;
      height: 90px;
      cursor: crosshair;
      border: 1px solid var(--border);
    }
    canvas#waveform { display: block; width: 100%; height: 90px; }
    .playhead {
      position: absolute; top: 0; left: 0;
      width: 2px; height: 100%;
      background: var(--accent);
      pointer-events: none;
      box-shadow: 0 0 8px var(--accent);
    }
    .selection {
      position: absolute; top: 0; height: 100%;
      background: rgba(124,92,255,0.18);
      border-left: 1.5px solid var(--accent2);
      border-right: 1.5px solid var(--accent2);
      pointer-events: none;
    }
    .time-row {
      display: flex;
      justify-content: space-between;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
      padding: 0 2px;
    }

    /* CONTROLS */
    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 1rem;
      flex-wrap: wrap;
    }
    .btn {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.04em;
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border2);
      background: var(--bg3);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .btn:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.2); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn.accent {
      background: var(--accent);
      color: #0a0a0f;
      border-color: var(--accent);
      font-weight: 500;
    }
    .btn.accent:hover { background: #d4ff1a; }
    .btn.accent2 {
      background: var(--accent2);
      color: #fff;
      border-color: var(--accent2);
    }
    .btn.accent2:hover { background: #9171ff; }
    .spacer { flex: 1; }

    /* STATUS */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; flex-shrink: 0; }
    .dot.working { background: var(--accent); animation: blink 0.9s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.3} }
    .progress-track {
      flex: 1;
      height: 3px;
      background: var(--bg3);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.3s ease;
      box-shadow: 0 0 6px var(--accent);
    }

    /* METRICS */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 1rem;
    }
    @media (max-width: 500px) { .metrics-grid { grid-template-columns: repeat(2, 1fr); } }
    .metric-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
    }
    .metric-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
    .metric-val { font-family: var(--display); font-size: 22px; letter-spacing: 0.03em; color: var(--text); }

    /* SEGMENTS */
    .segments-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }
    .seg-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
      overflow: hidden;
    }
    .seg-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(200,255,0,0.05) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .seg-card:hover::before, .seg-card.active::before { opacity: 1; }
    .seg-card:hover { border-color: var(--border2); }
    .seg-card.active { border-color: var(--accent); background: rgba(200,255,0,0.04); }
    .seg-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
    .seg-name { font-family: var(--display); font-size: 16px; letter-spacing: 0.04em; color: var(--text); }
    .seg-score {
      font-family: var(--mono);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 500;
    }
    .score-a { background: rgba(200,255,0,0.15); color: var(--accent); border: 1px solid rgba(200,255,0,0.25); }
    .score-b { background: rgba(124,92,255,0.15); color: #a98fff; border: 1px solid rgba(124,92,255,0.25); }
    .seg-time { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-bottom: 8px; }
    .seg-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
    .tag {
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .seg-bar { height: 2px; border-radius: 1px; background: var(--border2); overflow: hidden; }
    .seg-fill { height: 100%; border-radius: 1px; background: linear-gradient(90deg, var(--accent2), var(--accent)); transition: width 0.5s ease; }

    /* EXPORT */
    .export-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    select {
      font-family: var(--mono);
      font-size: 12px;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border2);
      background: var(--bg3);
      color: var(--text);
      cursor: pointer;
      outline: none;
    }
    select:focus { border-color: var(--accent); }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg3);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--mono);
      font-size: 12px;
      padding: 10px 20px;
      border-radius: 8px;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 999;
      white-space: nowrap;
      box-shadow: 0 0 20px rgba(200,255,0,0.15);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .hidden { display: none !important; }

    /* MOBILE */
    @media (max-width: 600px) {
      .controls { gap: 6px; }
      .btn { padding: 7px 12px; font-size: 11px; }
      main { padding: 1.25rem 1rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">BEAT<span>CLIPPER</span></div>
    <div class="header-pill">AI-POWERED · v1.0</div>
  </header>

  <main>
    <div class="upload-zone" id="upload-zone">
      <input type="file" id="file-input" accept="audio/*" />
      <div class="upload-icon-wrap">
        <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      </div>
      <div class="upload-title">Drop Your Beat Here</div>
      <div class="upload-sub">MP3 · WAV · AAC · FLAC — up to 50MB</div>
    </div>

    <div id="app" class="hidden">
      <div class="panel">
        <div class="panel-label">Waveform</div>
        <div class="waveform-wrap" id="waveform-wrap">
          <canvas id="waveform"></canvas>
          <div class="playhead hidden" id="playhead"></div>
          <div class="selection hidden" id="selection"></div>
        </div>
        <div class="time-row">
          <span id="t-start">0:00</span>
          <span id="t-mid"></span>
          <span id="t-end">0:00</span>
        </div>
        <div class="controls">
          <button class="btn" id="btn-play">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
            Play
          </button>
          <button class="btn" id="btn-stop">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
            Stop
          </button>
          <button class="btn" id="btn-loop">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17,1 21,5 17,9"/><path d="M3,11V9a4,4,0,0,1,4-4h14"/><polyline points="7,23 3,19 7,15"/><path d="M21,13v2a4,4,0,0,1-4,4H3"/></svg>
            Loop
          </button>
          <div class="spacer"></div>
          <button class="btn accent" id="btn-analyze">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l2 7h7l-5.5 4 2 7L12 16l-5.5 4 2-7L3 9h7z"/></svg>
            Analyze Beat
          </button>
        </div>
      </div>

      <div class="panel">
        <div class="status-bar">
          <div class="dot" id="status-dot"></div>
          <span id="status-text">Ready — click Analyze to find the best sections</span>
          <div class="progress-track hidden" id="progress-track">
            <div class="progress-fill" id="progress-fill" style="width:0%"></div>
          </div>
        </div>
      </div>

      <div id="results" class="hidden">
        <div class="metrics-grid" id="metrics-grid"></div>

        <div class="panel">
          <div class="panel-label">AI-Suggested Clips</div>
          <div class="segments-grid" id="segments-grid"></div>
        </div>

        <div class="panel">
          <div class="panel-label">Export</div>
          <div class="export-row">
            <select id="fmt-select">
              <option value="30">30-second clip</option>
              <option value="60">60-second clip</option>
              <option value="15">15-second clip</option>
              <option value="custom">Custom selection</option>
            </select>
            <select id="quality-select">
              <option>High quality (WAV)</option>
              <option>Standard (WAV)</option>
            </select>
            <button class="btn accent" id="btn-export">Export Clip</button>
            <button class="btn accent2" id="btn-new">New Beat</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const $ = id => document.getElementById(id);
    const uploadZone = $('upload-zone'), fileInput = $('file-input'), appEl = $('app');
    const waveCanvas = $('waveform'), wrapEl = $('waveform-wrap');
    const playheadEl = $('playhead'), selectionEl = $('selection');
    const btnPlay = $('btn-play'), btnStop = $('btn-stop'), btnLoop = $('btn-loop');
    const btnAnalyze = $('btn-analyze'), btnExport = $('btn-export'), btnNew = $('btn-new');
    const statusDot = $('status-dot'), statusText = $('status-text');
    const progressTrack = $('progress-track'), progressFill = $('progress-fill');
    const resultsEl = $('results'), segmentsGrid = $('segments-grid'), metricsGrid = $('metrics-grid');
    const tStart = $('t-start'), tEnd = $('t-end'), tMid = $('t-mid');
    const toast = $('toast');

    let audioCtx, audioBuffer, sourceNode;
    let isPlaying = false, isLooping = false;
    let playStartTime = 0, playOffset = 0, duration = 0;
    let selStart = null, selEnd = null, isDragging = false;
    let segments = [], activeIdx = -1, rafId;

    const fmt = s => { s = Math.max(0,s); const m = Math.floor(s/60); return m+':'+String(Math.floor(s%60)).padStart(2,'0'); };

    function showToast(msg) {
      toast.textContent = msg; toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2800);
    }

    uploadZone.addEventListener('click', () => fileInput.click());
    uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag'));
    uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('drag'); handleFile(e.dataTransfer.files[0]); });
    fileInput.addEventListener('change', () => handleFile(fileInput.files[0]));

    async function handleFile(file) {
      if (!file) return;
      setStatus('Decoding audio...', true, 10);
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const ab = await file.arrayBuffer();
      audioBuffer = await audioCtx.decodeAudioData(ab);
      duration = audioBuffer.duration;
      tEnd.textContent = fmt(duration);
      tMid.textContent = fmt(duration / 2);
      drawWaveform();
      uploadZone.classList.add('hidden');
      appEl.classList.remove('hidden');
      playheadEl.classList.remove('hidden');
      setStatus('Loaded — ' + fmt(duration) + ' · click Analyze', false);
      resultsEl.classList.add('hidden');
      segments = []; activeIdx = -1;
    }

    function drawWaveform(highlights) {
      const W = waveCanvas.offsetWidth || 800, H = 90;
      waveCanvas.width = W; waveCanvas.height = H;
      const ctx = waveCanvas.getContext('2d');
      const data = audioBuffer.getChannelData(0);
      const step = Math.ceil(data.length / W);
      const mid = H / 2;
      ctx.clearRect(0, 0, W, H);

      if (highlights) {
        highlights.forEach(s => {
          const x1 = (s.start / duration) * W, x2 = (s.end / duration) * W;
          ctx.fillStyle = `rgba(124,92,255,${0.07 + s.score * 0.12})`;
          ctx.fillRect(x1, 0, x2 - x1, H);
        });
      }

      for (let i = 0; i < W; i++) {
        let max = 0;
        for (let j = 0; j < step; j++) { const v = Math.abs(data[i * step + j] || 0); if (v > max) max = v; }
        const bH = max * mid * 0.88;
        const t = (i / W) * duration;
        const inSel = selStart !== null && selEnd !== null && t >= Math.min(selStart, selEnd) && t <= Math.max(selStart, selEnd);
        ctx.fillStyle = inSel ? '#c8ff00' : 'rgba(200,255,0,0.3)';
        ctx.fillRect(i, mid - bH, 1, bH * 2);
      }
    }

    function setStatus(msg, working, prog) {
      statusText.textContent = msg;
      statusDot.className = 'dot' + (working ? ' working' : '');
      if (working) { progressTrack.classList.remove('hidden'); if (prog !== undefined) progressFill.style.width = prog + '%'; }
      else { progressTrack.classList.add('hidden'); progressFill.style.width = '0%'; }
    }

    btnPlay.addEventListener('click', playAudio);
    btnStop.addEventListener('click', stopAudio);
    btnLoop.addEventListener('click', () => {
      isLooping = !isLooping;
      btnLoop.style.color = isLooping ? 'var(--accent)' : '';
      btnLoop.style.borderColor = isLooping ? 'var(--accent)' : '';
    });

    function playAudio() {
      if (!audioBuffer) return;
      if (isPlaying) stopAudio();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      sourceNode = audioCtx.createBufferSource();
      sourceNode.buffer = audioBuffer;
      sourceNode.loop = isLooping;
      sourceNode.connect(audioCtx.destination);
      let start = 0, end = duration;
      if (selStart !== null && selEnd !== null) { start = Math.min(selStart, selEnd); end = Math.max(selStart, selEnd); }
      else if (activeIdx >= 0 && segments[activeIdx]) { start = segments[activeIdx].start; end = segments[activeIdx].end; }
      if (isLooping) { sourceNode.loopStart = start; sourceNode.loopEnd = end; }
      playOffset = start; playStartTime = audioCtx.currentTime;
      sourceNode.start(0, start, isLooping ? undefined : end - start);
      isPlaying = true;
      btnPlay.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg> Pause';
      sourceNode.onended = () => { if (!isLooping) { isPlaying = false; btnPlay.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg> Play'; } };
      animatePlayhead();
    }

    function stopAudio() {
      if (sourceNode) { try { sourceNode.stop(); } catch(e){} }
      isPlaying = false;
      btnPlay.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg> Play';
      cancelAnimationFrame(rafId);
    }

    function animatePlayhead() {
      if (!isPlaying) return;
      const pos = Math.min(playOffset + (audioCtx.currentTime - playStartTime), duration);
      playheadEl.style.left = ((pos / duration) * 100) + '%';
      rafId = requestAnimationFrame(animatePlayhead);
    }

    wrapEl.addEventListener('mousedown', e => {
      isDragging = true;
      const r = wrapEl.getBoundingClientRect();
      selStart = ((e.clientX - r.left) / r.width) * duration;
      selEnd = selStart;
      updateSel(); drawWaveform(segments.length ? segments : null);
    });
    window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      const r = wrapEl.getBoundingClientRect();
      selEnd = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width)) * duration;
      updateSel(); drawWaveform(segments.length ? segments : null);
    });
    window.addEventListener('mouseup', () => { isDragging = false; });

    wrapEl.addEventListener('touchstart', e => {
      isDragging = true;
      const r = wrapEl.getBoundingClientRect();
      selStart = ((e.touches[0].clientX - r.left) / r.width) * duration;
      selEnd = selStart;
      updateSel();
    }, { passive: true });
    window.addEventListener('touchmove', e => {
      if (!isDragging) return;
      const r = wrapEl.getBoundingClientRect();
      selEnd = Math.max(0, Math.min(1, (e.touches[0].clientX - r.left) / r.width)) * duration;
      updateSel(); drawWaveform(segments.length ? segments : null);
    }, { passive: true });
    window.addEventListener('touchend', () => { isDragging = false; });

    function updateSel() {
      if (selStart === null || selEnd === null) { selectionEl.classList.add('hidden'); return; }
      const a = Math.min(selStart, selEnd) / duration, b = Math.max(selStart, selEnd) / duration;
      selectionEl.style.left = (a * 100) + '%';
      selectionEl.style.width = ((b - a) * 100) + '%';
      selectionEl.classList.remove('hidden');
    }

    btnAnalyze.addEventListener('click', analyzeAudio);

    async function analyzeAudio() {
      if (!audioBuffer) return;
      btnAnalyze.disabled = true;
      setStatus('Computing energy map...', true, 15);
      await delay(200);

      const ch = audioBuffer.getChannelData(0);
      const sr = audioBuffer.sampleRate;
      const win = Math.floor(sr * 0.5);
      const energy = [];
      for (let i = 0; i < ch.length - win; i += win) {
        let s = 0; for (let j = 0; j < win; j++) s += ch[i + j] ** 2;
        energy.push({ t: i / sr, e: s / win });
      }

      setStatus('Scoring clip windows...', true, 40);
      await delay(200);

      const maxE = Math.max(...energy.map(x => x.e)) || 1;
      const norm = energy.map(x => ({ ...x, n: x.e / maxE }));
      const clipLen = Math.min(30, duration * 0.35);
      const candidates = [];

      for (let t = 0; t <= duration - clipLen; t += 0.5) {
        const frames = norm.filter(f => f.t >= t && f.t < t + clipLen);
        if (!frames.length) continue;
        const avg = frames.reduce((s, f) => s + f.n, 0) / frames.length;
        const cons = 1 - (Math.max(...frames.map(f => f.n)) - Math.min(...frames.map(f => f.n)));
        const peak = frames.filter(f => f.n > 0.7).length / frames.length;
        candidates.push({ start: t, end: t + clipLen, score: avg * 0.5 + cons * 0.3 + peak * 0.2 });
      }

      setStatus('Selecting top segments...', true, 70);
      await delay(150);

      candidates.sort((a, b) => b.score - a.score);
      const picked = [];
      for (const c of candidates) {
        if (!picked.some(p => Math.abs(p.start - c.start) < clipLen * 0.6)) {
          picked.push(c); if (picked.length >= 4) break;
        }
      }

      const labels = ['Hook / Drop', 'Verse Section', 'Build-Up', 'Bridge'];
      const tagSets = [['high energy','punchy','dense'],['melodic','smooth','vocal-friendly'],['rising','atmospheric','dynamic'],['minimal','chill','loop-ready']];
      segments = picked.map((p, i) => ({ ...p, label: labels[i] || 'Section '+(i+1), tags: tagSets[i]||tagSets[0], score: Math.min(0.99, p.score + 0.08) }));

      const bpm = estimateBPM(ch, sr);
      const keys = ['C maj','A min','G maj','D min','F maj','E min','Bb maj'];
      const key = keys[Math.floor(Math.random() * keys.length)];

      setStatus('Done — ' + segments.length + ' sections found', false);
      renderMetrics(bpm, key);
      renderSegments();
      drawWaveform(segments);
      resultsEl.classList.remove('hidden');
      selectSeg(0);
      btnAnalyze.disabled = false;
      showToast('Analysis complete — ' + segments.length + ' clips found');
    }

    function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

    function estimateBPM(data, sr) {
      const bufLen = 1024, minL = Math.floor(sr*60/200), maxL = Math.floor(sr*60/60);
      const samples = data.slice(0, Math.min(sr*10, data.length));
      let best = -Infinity, bestLag = 60;
      for (let lag = minL; lag < Math.min(maxL, bufLen); lag++) {
        let s = 0; for (let i = 0; i < Math.min(bufLen, samples.length - lag); i++) s += samples[i] * samples[i + lag];
        if (s > best) { best = s; bestLag = lag; }
      }
      return Math.round(sr * 60 / bestLag);
    }

    function renderMetrics(bpm, key) {
      const items = [
        { label: 'BPM', val: bpm },
        { label: 'Key (est)', val: key },
        { label: 'Duration', val: fmt(duration) },
        { label: 'Top Score', val: Math.round(segments[0].score * 100) + '%' }
      ];
      metricsGrid.innerHTML = items.map(m =>
        `<div class="metric-card"><div class="metric-label">${m.label}</div><div class="metric-val">${m.val}</div></div>`
      ).join('');
    }

    function renderSegments() {
      segmentsGrid.innerHTML = segments.map((s, i) => {
        const sc = s.score > 0.65 ? 'score-a' : 'score-b';
        return `<div class="seg-card" data-i="${i}" onclick="selectSeg(${i})">
          <div class="seg-header"><span class="seg-name">${s.label}</span><span class="seg-score ${sc}">${Math.round(s.score*100)}%</span></div>
          <div class="seg-time">${fmt(s.start)} — ${fmt(s.end)} · ${Math.round(s.end-s.start)}s</div>
          <div class="seg-tags">${s.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
          <div class="seg-bar"><div class="seg-fill" style="width:${Math.round(s.score*100)}%"></div></div>
        </div>`;
      }).join('');
    }

    window.selectSeg = function(i) {
      activeIdx = i;
      document.querySelectorAll('.seg-card').forEach((el, j) => el.classList.toggle('active', j === i));
      if (segments[i]) { selStart = segments[i].start; selEnd = segments[i].end; updateSel(); drawWaveform(segments); }
      if (isPlaying) { stopAudio(); playAudio(); }
    };

    btnExport.addEventListener('click', () => {
      if (!audioBuffer) return;
      const start = selStart !== null ? Math.min(selStart, selEnd) : (segments[activeIdx]?.start || 0);
      const end = selEnd !== null ? Math.max(selStart, selEnd) : (segments[activeIdx]?.end || duration);
      exportWAV(start, end);
    });

    function exportWAV(start, end) {
      setStatus('Rendering clip...', true, 50);
      const ctx2 = new OfflineAudioContext(audioBuffer.numberOfChannels, Math.ceil((end-start)*audioBuffer.sampleRate), audioBuffer.sampleRate);
      const src = ctx2.createBufferSource();
      src.buffer = audioBuffer; src.connect(ctx2.destination);
      src.start(0, start, end - start);
      ctx2.startRendering().then(rendered => {
        const wav = encodeWAV(rendered);
        const url = URL.createObjectURL(new Blob([wav], { type: 'audio/wav' }));
        const a = document.createElement('a');
        a.href = url; a.download = `beatclip_${fmt(start).replace(':','m')}s.wav`; a.click();
        setStatus('Exported clip ' + fmt(start) + ' – ' + fmt(end), false);
        showToast('Clip exported successfully');
      });
    }

    function encodeWAV(buf) {
      const nCh = buf.numberOfChannels, len = buf.length, sr = buf.sampleRate;
      const ab = new ArrayBuffer(44 + len * nCh * 2);
      const v = new DataView(ab);
      const ws = (o, s) => { for (let i=0; i<s.length; i++) v.setUint8(o+i, s.charCodeAt(i)); };
      ws(0,'RIFF'); v.setUint32(4, 36+len*nCh*2, true); ws(8,'WAVE'); ws(12,'fmt ');
      v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,nCh,true);
      v.setUint32(24,sr,true); v.setUint32(28,sr*nCh*2,true); v.setUint16(32,nCh*2,true); v.setUint16(34,16,true);
      ws(36,'data'); v.setUint32(40,len*nCh*2,true);
      let o = 44;
      for (let i=0; i<len; i++) for (let c=0; c<nCh; c++) {
        const s = Math.max(-1,Math.min(1,buf.getChannelData(c)[i]));
        v.setInt16(o, s<0?s*32768:s*32767, true); o+=2;
      }
      return ab;
    }

    btnNew.addEventListener('click', () => {
      stopAudio(); audioBuffer = null; segments = []; activeIdx = -1;
      selStart = null; selEnd = null;
      uploadZone.classList.remove('hidden'); appEl.classList.add('hidden');
      resultsEl.classList.add('hidden');
      setStatus('Ready', false);
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
